      "Représentants Légaux",

    const LBC_STEP   = "Interlocuteurs LBC-FT et Qualité";
    const ADMIN_STEP = "Administrateurs/membres du directoire/membres du conseil de surveillance";
    const ADMIN_FORMES = ['SELAS', 'SELASU', 'SELAFA', 'SELCA'];

    const buildSteps = (hasPM, profile, formeJuridique) => {
      const steps = [...BASE_STEPS];
      const hasAdmin = ADMIN_FORMES.includes(formeJuridique);

      // EXTRA_STEP après "Représentants Légaux"
      if (hasPM) {
        const rlIdx = steps.indexOf("Représentants Légaux");
        if (rlIdx !== -1) steps.splice(rlIdx + 1, 0, EXTRA_STEP);
      }

      // LBC_STEP après "Personne de contact principal"
      if (profile === 'SEC' || profile === 'SPE') {
        const pcpIdx = steps.indexOf("Personne de contact principal");
        if (pcpIdx !== -1) steps.splice(pcpIdx + 1, 0, LBC_STEP);
      }

      // ADMIN_STEP après LBC_STEP (si présent) ou après "Personne de contact principal"
      if (hasAdmin) {
        const lbcIdx = steps.indexOf(LBC_STEP);
        const pcpIdx = steps.indexOf("Personne de contact principal");
        const insertAfter = lbcIdx !== -1 ? lbcIdx : pcpIdx;
        if (insertAfter !== -1) steps.splice(insertAfter + 1, 0, ADMIN_STEP);
      }

      return steps;
    };

          const isActive = stepNum === currentStep;
          const isCompleted = stepNum < currentStep;
          const isLast = idx === steps.length - 1;

          return (
            <div key={idx} style={{ display: 'flex', flexDirection: 'row' }}>
              {/* Left: circle + connector line stacked in flex-column */}

                  height: '24px',

    // ============================================================
    // STEP 2: DATES DE SESSIONS

    const CalendarIcon = () => (
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
        <path d="M5.333 1.333v1.334M10.667 1.333v1.334M2 6.667h12M3.333 2.667h9.334c.736 0 1.333.597 1.333 1.333v9.333c0 .737-.597 1.334-1.333 1.334H3.333A1.333 1.333 0 0 1 2 13.333V4c0-.736.597-1.333 1.333-1.333z" stroke={T.color.gray} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    // ── DatePicker component (calendar popup) ──
    const DatePicker = ({ value, onChange, placeholder = "Sélectionnez une date" }) => {
      const [open, setOpen] = useState(false);
      const [yearPickerOpen, setYearPickerOpen] = useState(false);
      const today = new Date();
      const [viewYear, setViewYear] = useState(today.getFullYear());
      const [viewMonth, setViewMonth] = useState(today.getMonth());
      const yearListRef = React.useRef(null);

      const JOURS = ['lu', 'ma', 'me', 'je', 've', 'sa', 'di'];
      const MOIS = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];

      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      // Monday-based: 0=Mon … 6=Sun
      const firstDayRaw = new Date(viewYear, viewMonth, 1).getDay();
      const startDay = firstDayRaw === 0 ? 6 : firstDayRaw - 1;

      const prevMonth = () => {
        if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); }
        else setViewMonth(viewMonth - 1);
      };
      const nextMonth = () => {
        if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); }
        else setViewMonth(viewMonth + 1);
      };

      const selectDay = (day) => {
        const dd = String(day).padStart(2, '0');
        const mm = String(viewMonth + 1).padStart(2, '0');
        onChange(`${dd}/${mm}/${viewYear}`);
        setOpen(false);
      };

      const isToday = (day) => {
        return day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
      };

      // Parse selected date to highlight
      const selectedParts = (value || '').split('/');
      const isSelected = (day) => {
        if (selectedParts.length !== 3) return false;
        return parseInt(selectedParts[0]) === day && parseInt(selectedParts[1]) === viewMonth + 1 && parseInt(selectedParts[2]) === viewYear;
      };

      // Build grid cells: leading blanks + days + trailing
      const cells = [];
      for (let i = 0; i < startDay; i++) {
        // Previous month's trailing days
        const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();
        cells.push({ day: prevMonthDays - startDay + 1 + i, current: false });
      }
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, current: true });
      }
      const remaining = 42 - cells.length;
      for (let i = 1; i <= remaining; i++) {
        cells.push({ day: i, current: false });
      }

      return (
        <div style={{ position: 'relative' }}>
          {/* Input field */}
          <div
            onClick={() => setOpen(!open)}
            style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
              padding: '0 14px', background: T.color.white, cursor: 'pointer',

            <span style={{ fontSize: '14px', color: value ? T.color.textDark : T.color.gray, fontFamily: T.font }}>
              {value || placeholder}
            </span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
              <path d="M5.333 1.333v1.334M10.667 1.333v1.334M2 6.667h12M3.333 2.667h9.334c.736 0 1.333.597 1.333 1.333v9.333c0 .737-.597 1.334-1.333 1.334H3.333A1.333 1.333 0 0 1 2 13.333V4c0-.736.597-1.333 1.333-1.333z" stroke={T.color.gray} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>

          {/* Calendar popup */}
          {open && (
            <div style={{
              position: 'absolute', bottom: '46px', left: 0, zIndex: 50,
              background: T.color.white, border: `1px solid ${T.color.border}`,
              borderRadius: T.radius, boxShadow: T.shadow.card,
              padding: '16px', width: '300px',
            }}>
              {/* Header: < month year > */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                <button onClick={() => { if (yearPickerOpen) { setYearPickerOpen(false); } prevMonth(); }} style={{
                  background: 'none', border: 'none', cursor: 'pointer', fontSize: '16px',
                  color: T.color.gray, padding: '4px 8px', fontFamily: T.font,
                }}>&lt;</button>
                <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                  <span style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark }}>
                    {MOIS[viewMonth]}
                  </span>
                  <span
                    onClick={() => setYearPickerOpen(!yearPickerOpen)}
                    style={{
                      fontSize: '14px', fontWeight: 600, color: T.color.primaryBlue,
                      cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '2px',
                    }}
                  >
                    {viewYear}
                  </span>
                </div>
                <button onClick={() => { if (yearPickerOpen) { setYearPickerOpen(false); } nextMonth(); }} style={{
                  background: 'none', border: 'none', cursor: 'pointer', fontSize: '16px',
                  color: T.color.gray, padding: '4px 8px', fontFamily: T.font,
                }}>&gt;</button>
              </div>

              {/* Year picker grid */}
              {yearPickerOpen && (
                <div ref={yearListRef} style={{
                  display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '6px',
                  marginBottom: '12px', maxHeight: '180px', overflowY: 'auto',
                  padding: '4px',
                }}>
                  {Array.from({ length: 30 }, (_, i) => today.getFullYear() - 25 + i).map(y => (
                    <div
                      key={y}
                      onClick={() => { setViewYear(y); setYearPickerOpen(false); }}
                      style={{
                        textAlign: 'center', padding: '8px 4px', fontSize: '13px',
                        fontFamily: T.font, cursor: 'pointer', borderRadius: T.radius,
                        fontWeight: y === viewYear ? 700 : 400,
                        color: y === viewYear ? T.color.white : T.color.textDark,
                        background: y === viewYear ? T.color.primaryBlue : 'transparent',
                        transition: 'background 0.1s',
                      }}
                      onMouseEnter={e => { if (y !== viewYear) e.currentTarget.style.background = T.color.radioBg; }}
                      onMouseLeave={e => { if (y !== viewYear) e.currentTarget.style.background = 'transparent'; }}
                    >
                      {y}
                    </div>
                  ))}
                </div>
              )}

              {/* Day headers */}
              {!yearPickerOpen && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px', marginBottom: '4px' }}>
                {JOURS.map(j => (
                  <div key={j} style={{ textAlign: 'center', fontSize: '12px', fontWeight: 500, color: T.color.gray, padding: '4px 0' }}>
                    {j}
                  </div>
                ))}
              </div>
              )}

              {/* Day cells */}
              {!yearPickerOpen && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '2px' }}>
                {cells.map((c, idx) => {
                  const sel = c.current && isSelected(c.day);
                  const tod = c.current && isToday(c.day);
                  return (
                    <div
                      key={idx}
                      onClick={c.current ? () => selectDay(c.day) : undefined}
                      style={{
                        textAlign: 'center', fontSize: '13px', padding: '6px 0',
                        cursor: c.current ? 'pointer' : 'default',
                        color: !c.current ? '#C6D1E2' : sel ? T.color.white : T.color.textDark,
                        background: sel ? T.color.primaryBlue : 'transparent',
                        borderRadius: '50%',
                        width: '32px', height: '32px',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        margin: '0 auto',
                        fontWeight: tod && !sel ? 600 : 400,
                        border: tod && !sel ? `2px solid ${T.color.primaryBlue}` : 'none',
                        transition: 'all 0.1s',
                      }}
                    >
                      {c.day}
                    </div>
                  );
                })}
              </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const Step2Content = ({ croec }) => {

        if (!str) return null;

        return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));

      // Validation logic
      const getDateError = () => {
        if (!dateUlterieure) return null;
        const chosen = parseDate(dateUlterieure);
        if (!chosen) return null;
        const today = new Date(); today.setHours(0,0,0,0);

        // RG9: max 6 months
        if (chosen > maxDate) return "Vérifier l'information renseignée.";
        if (noDates) {
          // RG8: no sessions → date must be strictly after today
          if (chosen <= today) return "Vérifier l'information renseignée.";

          // RG7: date must be strictly after next session date
          const nextSession = SESSIONS_DATA[0].date;

              </p>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '16px' }}>
                {SESSIONS_DATA.map((s, idx) => (
                  <div key={idx} style={{

                    {dateError}

      // Helpers

      const errMontant = montant && !isInteger(montant) ? errMsg : '';

      const errValeur = valeur && !isDecimal2(valeur) ? errMsg : '';
      const errVoix = voix && !isInteger(voix) ? errMsg : '';

      // Cross-field: Nb titres × Valeur nominale == Montant
      const crossCheck = titres && valeur && montant && !errMontant && !errTitres && !errValeur;
      const calcul = crossCheck ? parseNum(titres) * parseNum(valeur) : null;
      const montantNum = crossCheck ? parseNum(montant) : null;
      const errCross = crossCheck && Math.abs(calcul - montantNum) > 0.01
        ? `Incohérence : Nombre de titres (${titres}) × Valeur nominale (${valeur}) = ${calcul.toFixed(2)} €, mais le montant saisi est ${montant} €.`

              borderRadius: T.radius,
            }}>
              <p style={{ fontSize: '13px', color: '#991B1B', margin: 0, lineHeight: '18px' }}>{errCross}</p>
            </div>

    // ── Reusable Address Block ──

      const pfx = (k) => prefix ? `${prefix}${k.charAt(0).toUpperCase()}${k.slice(1)}` : k;
      const val = (k) => data[pfx(k)] || '';
      const set = (k, v) => onChange(pfx(k), v);
      const req = !noRequired;

      const [addrQuery, setAddrQuery] = React.useState('');
      const [addrOpen, setAddrOpen] = React.useState(false);
      const [addrResults, setAddrResults] = React.useState([]);
      const addrRef = React.useRef(null);

      React.useEffect(() => {
        const handler = (e) => { if (addrRef.current && !addrRef.current.contains(e.target)) setAddrOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const handleAddrSearch = (q) => {
        setAddrQuery(q);
        if (q.length < 1) { setAddrResults([]); setAddrOpen(false); return; }
        const lower = q.toLowerCase();
        const filtered = MOCK_ADRESSES.filter(a => a.label.toLowerCase().includes(lower));
        setAddrResults(filtered);
        setAddrOpen(filtered.length > 0);
      };

      const selectAddr = (addr) => {
        if (onSelectAddress) {
          // Batch update : tous les champs en un seul appel pour éviter les mises à jour écrasées
          const batch = {};
          ['rue', 'codePostal', 'ville', 'pays'].forEach(k => { batch[pfx(k)] = addr[k] || ''; });
          onSelectAddress(batch);
        } else {
          set('rue', addr.rue);
          set('codePostal', addr.codePostal);
          set('ville', addr.ville);
          set('pays', addr.pays);
        }
        setAddrQuery(addr.label);
        setAddrOpen(false);
      };

      return (
        <>
          <div style={{ marginBottom: '16px', position: 'relative' }} ref={addrRef}>

              Recherche adresse
            </label>
            <input
              value={addrQuery}
              onChange={e => handleAddrSearch(e.target.value)}
              onFocus={() => { if (addrResults.length > 0) setAddrOpen(true); }}
              placeholder="Saisissez une adresse..."
              style={{
                width: '100%', height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                padding: '0 14px', fontSize: '14px', color: T.color.textDark, fontFamily: T.font,
                background: T.color.white, outline: 'none',
              }}
            />
            {addrOpen && addrResults.length > 0 && (
              <div style={{
                position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 1000,
                background: T.color.white, border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                boxShadow: T.shadow, maxHeight: '220px', overflowY: 'auto',

                  <div
                    key={i}
                    onClick={() => selectAddr(addr)}
                    style={{
                      padding: '10px 14px', cursor: 'pointer', fontSize: '14px',
                      color: T.color.textDark, borderBottom: i < addrResults.length - 1 ? `1px solid ${T.color.bgLight}` : 'none',
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = T.color.bgLight}
                    onMouseLeave={e => e.currentTarget.style.background = T.color.white}
                  >
                    {addr.label}
                  </div>
                ))}
              </div>
            )}

            <FieldInput label="Rue" required={req} value={val('rue')} onChange={v => set('rue', v)} />

          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Complément d'adresse" value={val('complement')} onChange={v => set('complement', v)} />
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Lieu-dit" value={val('lieuDit')} onChange={v => set('lieuDit', v)} />

          </div>
          <div style={{ marginBottom: '16px' }}>

        </label>
        <div style={{
          width: '100%', height: '40px', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
          padding: '0 14px', fontSize: '14px', color: T.color.textDark, background: '#E5E7EB',
          display: 'flex', alignItems: 'center', fontFamily: T.font,
        }}>
          {value || ''}
        </div>
      </div>
    );

    // ── Person Search Autocomplete ──
    const PersonSearchAutocomplete = ({ onSelectPerson, onManual, onClear, searchMode, selectedLabel }) => {
      const [query, setQuery] = useState('');
      const [focused, setFocused] = useState(false);
      const containerRef = React.useRef(null);

      React.useEffect(() => {
        const handler = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) {
            setFocused(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const filtered = query.length >= 1
        ? MOCK_PERSONNES_PP.filter(p =>
            `${p.nom} ${p.prenom}`.toLowerCase().includes(query.toLowerCase()) ||
            p.nom.toLowerCase().startsWith(query.toLowerCase())
          )
        : [];

      const showDropdown = focused && !searchMode;

      const handleSelect = (person) => {
        setQuery(`${person.civilite} ${person.nom} ${person.prenom} - ${person.region}`);
        setFocused(false);
        onSelectPerson(person);
      };

      const handleManual = () => {
        setQuery('+ Renseignez manuellement');
        setFocused(false);
        onManual();
      };

      const handleClear = () => {
        setQuery('');
        setFocused(true);
        onClear();
      };

      const handleChange = (e) => {
        const v = e.target.value;
        setQuery(v);
        if (searchMode) onClear();
      };

      return (
        <div ref={containerRef} style={{ position: 'relative', marginBottom: '16px' }}>
          <p style={{ fontSize: '14px', fontWeight: 500, color: T.color.textDark, margin: '0 0 6px 0' }}>
            <span style={{ color: '#C81E1E' }}>* </span>Recherchez la personne physique
          </p>
          <div style={{
            display: 'flex', alignItems: 'center',
            border: `1px solid ${T.color.border}`, borderRadius: T.radius,
            height: '40px', background: T.color.white, overflow: 'hidden',
          }}>
            <input
              value={searchMode ? (selectedLabel || query) : query}
              onChange={handleChange}
              onFocus={() => !searchMode && setFocused(true)}
              readOnly={!!searchMode}
              placeholder="Saisissez le NOM, Prénom, CROEC d'inscription principale"
              style={{
                flex: 1, border: 'none', outline: 'none', fontSize: '14px',
                color: T.color.textDark, background: 'transparent', fontFamily: T.font,
                padding: '0 14px', height: '100%',
              }}
            />
            {searchMode && (
              <span onClick={handleClear} style={{
                cursor: 'pointer', color: T.color.gray, fontWeight: 600,
                padding: '0 14px', fontSize: '14px',
              }}>✕</span>
            )}
          </div>

          {/* Dropdown suggestions */}
          {showDropdown && (
            <div style={{
              position: 'absolute', top: '68px', left: 0, right: 0, zIndex: 50,
              background: T.color.white, border: `1px solid ${T.color.border}`,
              borderRadius: T.radius, boxShadow: T.shadow.card, maxHeight: '240px', overflowY: 'auto',
            }}>
              {filtered.map((p, idx) => (
                <div key={idx} onClick={() => handleSelect(p)} style={{
                  padding: '10px 14px', fontSize: '14px', color: T.color.textDark,
                  cursor: 'pointer', borderBottom: `1px solid ${T.color.border}`,
                  transition: 'background 0.1s',
                }}
                onMouseEnter={e => e.currentTarget.style.background = T.color.radioBg}
                onMouseLeave={e => e.currentTarget.style.background = T.color.white}
                >
                  {p.civilite} {p.nom} {p.prenom} - {p.region}
                </div>
              ))}
              <div onClick={handleManual} style={{
                padding: '10px 14px', fontSize: '14px', color: T.color.textDark,
                cursor: 'pointer', fontWeight: 500,
              }}
              onMouseEnter={e => e.currentTarget.style.background = T.color.radioBg}
              onMouseLeave={e => e.currentTarget.style.background = T.color.white}
              >
                + Renseignez manuellement
              </div>
            </div>
          )}
        </div>
      );
    };

    // Options du picklist « Fonction » (contexte Admin : Administrateurs / membres du
    // directoire / membres du conseil de surveillance). Pas d'option « Autre » : la
    // liste est fermée.
    const ADMIN_FONCTION_OPTIONS = [
      "Administrateur",
      "Membre du directoire",
      "Membre du conseil de surveillance",
    ];

    // Dropdown for Statut / Fonction (paramétrable selon le contexte)
    const StatutSelect = ({
      value, onChange, autreValue, onAutreChange,
      label = "Statut au sein de la société en cours d'inscription",
      options = STATUT_OPTIONS,
    }) => (
      <>
        <div style={{ marginBottom: value === 'Autre' ? '16px' : '16px' }}>
          <FieldSelect
            label={label}
            required
            value={value}
            onChange={v => { onChange(v); if (v !== 'Autre' && onAutreChange) onAutreChange(''); }}
            options={options}
            placeholder="Sélectionnez"
          />
        </div>
        {value === 'Autre' && options.includes('Autre') && (
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Autre - précisez" required value={autreValue || ''} onChange={v => onAutreChange && onAutreChange(v)} />
          </div>
        )}
      </>
    );

    const NATURE_DROITS_OPTIONS = ["Pleine propriété", "Nue-propriété", "Usufruit"];

    // Single participation row
    const ParticipationRow = ({ data, onChange, onRemove, index }) => {
      const d = data || {};
      const u = (k, v) => onChange({ ...d, [k]: v });
      return (
        <div style={{
          border: `1px solid ${T.color.border}`, borderRadius: T.radius,
          padding: '16px', marginBottom: '12px', background: T.color.white,
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
            <span style={{ fontSize: '13px', fontWeight: 600, color: T.color.gray }}>Participation {index + 1}</span>
            {onRemove && (
              <button onClick={onRemove} style={{
                background: 'none', border: 'none', cursor: 'pointer', fontSize: '12px', color: T.color.primaryRed, fontFamily: T.font,
              }}>Supprimer</button>
            )}
          </div>
          <div style={{ marginBottom: '16px' }}>
            <FieldSelect label="Nature des droits" required value={d.natureDroits} onChange={v => u('natureDroits', v)} options={NATURE_DROITS_OPTIONS} placeholder="Sélectionnez" />
          </div>
          <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0' }}>Capital détenu</p>
          <div style={{ marginBottom: '16px' }}>
            <FieldInput label="Nombre de titres" required value={d.nombreTitres} onChange={v => u('nombreTitres', v)} placeholder="Saisissez un nombre entier" />
            {d.nombreTitres && !/^\d+$/.test(d.nombreTitres) && <p style={{ fontSize: '13px', color: '#C81E1E', margin: '4px 0 0 0', lineHeight: '18px' }}>Vérifiez l'information saisie.</p>}
          </div>
          <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0' }}>Droit de vote détenu</p>
          <div>
            <FieldInput label="Nombre de voix" required value={d.nombreVoix} onChange={v => u('nombreVoix', v)} placeholder="Saisissez un nombre entier" />
            {d.nombreVoix && !/^\d+$/.test(d.nombreVoix) && <p style={{ fontSize: '13px', color: '#C81E1E', margin: '4px 0 0 0', lineHeight: '18px' }}>Vérifiez l'information saisie.</p>}
          </div>
        </div>
      );
    };

    // Participation section with Ajouter
    const ParticipationSection = ({ items, onAdd, onUpdate, onRemove }) => (
      <div style={{ borderTop: `1px solid ${T.color.border}`, paddingTop: '24px', marginTop: '8px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
          <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: 0 }}>
            <span style={{ color: '#C81E1E' }}>* </span>Participation
          </p>
          <button onClick={onAdd} style={{
            background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
            padding: '6px 16px', fontSize: '14px', color: T.color.primaryBlue,
            cursor: 'pointer', fontFamily: T.font, fontWeight: 500,
          }}>Ajouter</button>
        </div>
        <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 16px 0' }}>
          Complétez les informations suivantes
        </p>
        {items.map((item, idx) => (
          <ParticipationRow
            key={idx}
            index={idx}
            data={item}
            onChange={newData => onUpdate(idx, newData)}
            onRemove={items.length > 1 ? () => onRemove(idx) : null}
          />
        ))}
      </div>
    );

    // Personne Physique sub-card
    const PersonnePhysiqueCard = ({ data, update, profile, title, actionButton, context }) => {
      const d = data || {};
      const u = (k, v) => update(k, v);
      const associeOui = d.associe === 'Oui';
      const associeNon = d.associe === 'Non';
      // Contexte : « admin » → libellés et picklist adaptés (Administrateurs / membres
      // du directoire / membres du conseil de surveillance). Par défaut : représentant légal.
      const isAdmin = context === 'admin';
      const subjectLabel = isAdmin ? 'Cet administrateur' : 'Ce représentant légal';
      const statutLabel = isAdmin ? 'Fonction' : "Statut au sein de la société en cours d'inscription";
      const statutOptions = isAdmin ? ADMIN_FONCTION_OPTIONS : STATUT_OPTIONS;
      const exerceLabel = isAdmin
        ? "Cet administrateur exercera-t-il la profession d'expert-comptable au sein de la société en cours d'inscription ?"
        : "Ce représentant légal exercera-t-il au sein de la société en cours d'inscription ?";
      const participations = d.participations || [{}];
      const mode = d.searchMode; // undefined | 'selected' | 'manual'
      const isSelected = mode === 'selected';
      const isManual = mode === 'manual';
      const showFields = isSelected || isManual;

      const handleSelectPerson = (person) => {
        u('searchMode', 'selected');
        u('civilite', person.civilite);
        u('nom', person.nom);
        u('prenom', person.prenom);
        u('prenom2', person.prenom2 || '');
        u('prenom3', person.prenom3 || '');
        u('prenom4', person.prenom4 || '');
        u('conseilRegional', person.conseilRegional);
        u('searchLabel', `${person.civilite} ${person.nom} ${person.prenom} - ${person.region}`);
      };

      const handleManual = () => {
        u('searchMode', 'manual');
        u('civilite', ''); u('nom', ''); u('prenom', ''); u('prenom2', '');
        u('prenom3', ''); u('prenom4', ''); u('conseilRegional', '');
        u('searchLabel', '+ Renseignez manuellement');
      };

      const handleClear = () => {
        u('searchMode', undefined);
        u('civilite', ''); u('nom', ''); u('prenom', ''); u('prenom2', '');
        u('prenom3', ''); u('prenom4', ''); u('conseilRegional', '');
        u('searchLabel', '');
      };

      return (
        <SectionCard>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
            <SectionTitle>{title || "Représentant légal personne physique"}</SectionTitle>
            {actionButton !== undefined ? actionButton : (
              <button style={{
                background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                padding: '6px 16px', fontSize: '14px', color: T.color.primaryRed,
                cursor: 'pointer', fontFamily: T.font, fontWeight: 500,
              }}>Ajouter</button>
            )}
          </div>

          {/* Search autocomplete */}
          <PersonSearchAutocomplete
            onSelectPerson={handleSelectPerson}
            onManual={handleManual}
            onClear={handleClear}
            searchMode={mode}
            selectedLabel={d.searchLabel}
          />

          {/* ── Fields shown only after selection or manual ── */}
          {showFields && (
            <>
              {/* Civilité */}
              <div style={{ marginBottom: '16px' }}>
                <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 8px 0' }}>
                  <span style={{ color: '#C81E1E' }}>* </span>Civilité
                </p>
                <div style={{ display: 'flex', gap: '24px' }}>
                  {CIVILITE_OPTIONS.map(opt => {
                    const selected = d.civilite === opt;
                    return (
                      <label key={opt} onClick={isManual ? () => u('civilite', opt) : undefined} style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: isManual ? 'pointer' : 'default' }}>
                        <div style={{
                          width: '20px', height: '20px', borderRadius: '50%', flexShrink: 0,
                          border: `2px solid ${selected ? T.color.primaryBlue : T.color.borderMedium}`,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          background: T.color.white,
                        }}>
                          {selected && <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: T.color.primaryBlue }} />}
                        </div>
                        <span style={{ fontSize: '14px', color: T.color.textDark }}>{opt}</span>
                      </label>
                    );
                  })}
                </div>
              </div>

              {/* Name fields */}
              {isSelected ? (
                <>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <ReadOnlyField label="Nom de famille" required value={d.nom} />
                    <ReadOnlyField label="Prénom" required value={d.prenom} />
                    <ReadOnlyField label="Prénom 2" value={d.prenom2} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <ReadOnlyField label="Prénom 3" value={d.prenom3} />
                    <ReadOnlyField label="Prénom 4" value={d.prenom4} />
                  </div>
                  <div style={{ marginBottom: '16px' }}>
                    <ReadOnlyField label="Conseil régional d'inscription principale" required value={d.conseilRegional} />
                  </div>
                </>
              ) : (
                <>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <FieldInput label="Nom de famille" required value={d.nom} onChange={v => u('nom', v)} />
                    <FieldInput label="Prénom" required value={d.prenom} onChange={v => u('prenom', v)} />
                    <FieldInput label="Prénom 2" value={d.prenom2} onChange={v => u('prenom2', v)} />
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <FieldInput label="Prénom 3" value={d.prenom3} onChange={v => u('prenom3', v)} />
                    <FieldInput label="Prénom 4" value={d.prenom4} onChange={v => u('prenom4', v)} />
                    <FieldSelect label="Nationalité" required value={d.nationalite} onChange={v => u('nationalite', v)} options={PAYS_OPTIONS} placeholder="Sélectionnez" />
                  </div>
                  {/* Adresse du domicile personnel */}
                  <AddressBlock data={d} onChange={(k, v) => u(k, v)} />
                </>
              )}
            </>
          )}

          {/* ── 3 options situation (checkboxes cumulables 1&2, exclusive 3) ── */}
          <SituationCheckboxes
            data={d}
            update={u}
            profile={profile}
            questionLabel={isAdmin ? "Cet administrateur :" : "Ce représentant légal :"}
            orgLabel="À quelle organisation de la profession comptable adhère ce représentant légal dans ce pays ?"
          />

          {/* Statut au sein de la société / Fonction (toujours visible) */}
          <StatutSelect
            value={d.statut}
            onChange={v => u('statut', v)}
            autreValue={d.statutAutre}
            onAutreChange={v => u('statutAutre', v)}
            label={statutLabel}
            options={statutOptions}
          />

          {/* Question "exercera-t-il" — visible UNIQUEMENT pour SPE et SEC */}
          {(profile === 'SPE' || profile === 'SEC') && (
            <OuiNon
              label={exerceLabel}
              required
              value={d.exerceAuSein}
              onChange={v => u('exerceAuSein', v)}
            />
          )}

          {/* Q3: associé */}
          <OuiNon
            label={`${subjectLabel} est-il ou sera t-il associé au sein de la société en cours d'inscription ?`}
            required
            value={d.associe}
            onChange={v => u('associe', v)}
          />

          {/* Conditional on associé = Oui: Participation + Bénéficiaire + Birth info */}
          {associeOui && (
            <>
              <ParticipationSection
                items={participations}
                onAdd={() => u('participations', [...participations, {}])}
                onUpdate={(idx, newData) => {
                  const next = [...participations];
                  next[idx] = newData;
                  u('participations', next);
                }}
                onRemove={idx => {
                  const next = participations.filter((_, i) => i !== idx);
                  u('participations', next);
                }}
              />

              <div style={{ marginTop: '16px' }}>
                <OuiNon
                  label={`${subjectLabel} est-il un bénéficiaire effectif au sens de l'article R561-1 du code monétaire et financier de la société en cours d'inscription ?`}
                  required
                  value={d.beneficiaire}
                  onChange={v => u('beneficiaire', v)}
                />
              </div>

              {d.beneficiaire === 'Oui' && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                  <div>
                    <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '6px', color: T.color.textDark }}>
                      <span style={{ color: '#C81E1E', marginRight: '3px' }}>*</span>Date de naissance
                    </label>
                    <DatePicker value={d.dateNaissance} onChange={v => u('dateNaissance', v)} />
                  </div>
                  <FieldInput label="Lieu de naissance" required value={d.lieuNaissance} onChange={v => u('lieuNaissance', v)} placeholder="Saisissez une ville ou un pays" />
                </div>
              )}
            </>
          )}

          {/* Scénario 12 — PP : associé = Non + profil SEC ou SPEC → question mère/filiale
              (masquée en mode admin car non pertinente pour les administrateurs) */}
          {associeNon && (profile === 'SEC' || profile === 'SPEC') && !isAdmin && (
            <div style={{ borderTop: `1px solid ${T.color.border}`, paddingTop: '24px', marginTop: '8px' }}>
              <OuiNon
                label="Ce représentant légal est-il associé de la société, inscrite à l'Ordre, mère ou filiale de la société en cours d'inscription ?"
                required
                value={d.associeOrdreMereFiliale}
                onChange={v => u('associeOrdreMereFiliale', v)}
              />

              {/* Scénario 13 — PP : mère/filiale = Oui → autocomplete société */}
              {d.associeOrdreMereFiliale === 'Oui' && (
                <div style={{ marginTop: '8px' }}>
                  <SocieteSearchAutocomplete
                    searchMode={d.aomfSearchMode}
                    selectedLabel={d.aomfSelectedLabel}
                    onSelectSociete={(societe) => {
                      u('aomfSearchMode', 'selected');
                      u('aomfSelectedLabel', `${societe.siren} - ${societe.denomination}`);
                      u('aomfDenomination', societe.denomination);
                      u('aomfFormeJuridique', societe.formeJuridique || 'SAS');
                      u('aomfSiren', societe.siren);
                      u('aomfRue', societe.rue || '12 Rue de la Paix');
                      u('aomfComplement', societe.complement || '');
                      u('aomfLieuDit', societe.lieuDit || '');
                      u('aomfCodePostal', societe.codePostal || '75002');
                      u('aomfVille', societe.ville || 'Paris');
                      u('aomfPays', societe.pays || 'France');
                    }}
                    onManual={() => {
                      u('aomfSearchMode', 'manual');
                      u('aomfSelectedLabel', '+ Renseignez manuellement');
                      u('aomfDenomination', ''); u('aomfFormeJuridique', ''); u('aomfFormeJuridiqueAutre', '');
                      u('aomfSiren', '');
                      u('aomfRue', ''); u('aomfComplement', ''); u('aomfLieuDit', '');
                      u('aomfCodePostal', ''); u('aomfVille', ''); u('aomfPays', '');
                    }}
                    onClear={() => {
                      u('aomfSearchMode', null); u('aomfSelectedLabel', '');
                      u('aomfDenomination', ''); u('aomfFormeJuridique', ''); u('aomfFormeJuridiqueAutre', '');
                      u('aomfSiren', '');
                      u('aomfRue', ''); u('aomfComplement', ''); u('aomfLieuDit', '');
                      u('aomfCodePostal', ''); u('aomfVille', ''); u('aomfPays', '');
                    }}
                  />

                  {/* Mode sélection : Dénomination, Forme juridique, SIREN + adresse en lecture seule (fond gris) */}
                  {d.aomfSearchMode === 'selected' && (
                    <div style={{ marginTop: '12px' }}>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                        <ReadOnlyField label="Dénomination sociale" required value={d.aomfDenomination} />
                        <ReadOnlyField label="Forme juridique" required value={d.aomfFormeJuridique} />
                      </div>
                      <div style={{ marginBottom: '16px' }}>
                        <ReadOnlyField label="SIREN" required value={d.aomfSiren} />
                      </div>
                      <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 12px 0' }}>
                        Adresse du siège social
                      </p>
                      <div style={{ marginBottom: '16px' }}>
                        <ReadOnlyField label="Rue" required value={d.aomfRue} />
                      </div>
                      <div style={{ marginBottom: '16px' }}>
                        <ReadOnlyField label="Complément d'adresse" value={d.aomfComplement} />
                      </div>
                      <div style={{ marginBottom: '16px' }}>
                        <ReadOnlyField label="Lieu-dit" value={d.aomfLieuDit} />
                      </div>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                        <ReadOnlyField label="Code postal" required value={d.aomfCodePostal} />
                        <ReadOnlyField label="Ville" required value={d.aomfVille} />
                      </div>
                      <div style={{ marginBottom: '16px' }}>
                        <ReadOnlyField label="Pays" required value={d.aomfPays} />
                      </div>
                    </div>
                  )}

                  {/* Mode manuel : Dénomination, Forme juridique (dropdown), SIREN + adresse éditables */}
                  {d.aomfSearchMode === 'manual' && (
                    <div style={{ marginTop: '12px' }}>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                        <FieldInput label="Dénomination sociale" required value={d.aomfDenomination} onChange={v => u('aomfDenomination', v)} />
                        <FieldSelect label="Forme juridique" required value={d.aomfFormeJuridique} onChange={v => { u('aomfFormeJuridique', v); if (v !== 'Autre') u('aomfFormeJuridiqueAutre', ''); }} options={FORMES_JURIDIQUES_PM} placeholder="Sélectionnez" />
                      </div>
                      {d.aomfFormeJuridique === 'Autre' && (
                        <div style={{ marginBottom: '16px' }}>
                          <FieldInput label="Autre - précisez" required value={d.aomfFormeJuridiqueAutre} onChange={v => u('aomfFormeJuridiqueAutre', v)} />
                        </div>

        u('adminsPM', prev => (prev || []).map((a, i) => i === idx ? { ...a, [key]: val } : a));

          <div>
            <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0', lineHeight: '36px' }}>
              Administrateurs / membres du directoire / membres du conseil de surveillance
            </h2>
            <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 8px 0', lineHeight: 1.5 }}>
              Déclarez les administrateurs, membres du directoire, membres du conseil de surveillance hors représentants et personne de contact principal déjà déclarés plus haut.
            </p>
            <p style={{ fontSize: '13px', color: T.color.gray, margin: '0' }}>
              <span style={{ color: T.color.primaryRed }}>*</span> Champs obligatoires
            </p>
          </div>

          {/* Checkboxes PP & PM (affichage simple, pile sans carte) avec blocs qui
              s'ouvrent directement sous chaque checkbox cochée */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>

            {/* Checkbox PP */}
            <label onClick={togglePP} style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', cursor: 'pointer' }}>
              <div style={{ width: '18px', height: '18px', borderRadius: '4px', flexShrink: 0, marginTop: '2px', border: `2px solid ${declareAdminsPP ? T.color.primaryBlue : T.color.borderMedium}`, background: declareAdminsPP ? T.color.primaryBlue : T.color.white, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {declareAdminsPP && (
                  <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                    <path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </div>
              <span style={{ fontSize: '14px', color: T.color.textDark, lineHeight: 1.5 }}>
                Déclarez les administrateurs/ membres du directoire/ membres du conseil de surveillance - <strong>Personne Physique</strong>.
              </span>
            </label>

            {/* Bloc PP — s'ouvre directement SOUS la checkbox PP */}
            {declareAdminsPP && (
              <div style={{ marginTop: '4px', marginBottom: '8px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                  <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: 0 }}>
                    Administrateurs/ membres du directoire/ membres du conseil de surveillance
                  </p>
                  <button onClick={addAdmin} style={{
                    background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                    padding: '6px 16px', fontSize: '14px', color: T.color.primaryBlue,
                    cursor: 'pointer', fontFamily: T.font, fontWeight: 500,
                  }}>Ajouter</button>
                </div>
                <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 16px 0' }}>
                  Complétez les informations pour chaque personne
                </p>
                {adminsPP.map((admin, idx) => (
                  <AdminPPCard
                    key={admin.id || idx}
                    data={admin}
                    idx={idx}
                    canRemove={adminsPP.length > 1}
                    onUpdate={(k, v) => updateAdmin(idx, k, v)}
                    onRemove={() => removeAdmin(idx)}
                    profile={profile}
                  />
                ))}
              </div>
            )}

            {/* Checkbox PM */}
            <label onClick={togglePM} style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', cursor: 'pointer' }}>
              <div style={{ width: '18px', height: '18px', borderRadius: '4px', flexShrink: 0, marginTop: '2px', border: `2px solid ${declareAdminsPM ? T.color.primaryBlue : T.color.borderMedium}`, background: declareAdminsPM ? T.color.primaryBlue : T.color.white, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                {declareAdminsPM && (
                  <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                    <path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </div>
              <span style={{ fontSize: '14px', color: T.color.textDark, lineHeight: 1.5 }}>
                Déclarez les administrateurs/ membres du directoire/ membres du conseil de surveillance - <strong>Personne Morale</strong>.
              </span>
            </label>

            {/* Bloc PM — s'ouvre directement SOUS la checkbox PM */}
            {declareAdminsPM && (
              <div style={{ marginTop: '4px', marginBottom: '8px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                  <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: 0 }}>
                    Administrateurs/ membres du directoire/ membres du conseil de surveillance
                  </p>
                  <button onClick={addAdminPM} style={{
                    background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                    padding: '6px 16px', fontSize: '14px', color: T.color.primaryBlue,
                    cursor: 'pointer', fontFamily: T.font, fontWeight: 500,
                  }}>Ajouter</button>
                </div>
                <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 16px 0' }}>
                  Complétez les informations pour chaque société
                </p>
                {adminsPM.map((admin, idx) => (
                  <AdminPMCard
                    key={admin.id || idx}
                    data={admin}
                    idx={idx}
                    canRemove={adminsPM.length > 1}
                    onUpdate={(k, v) => updateAdminPM(idx, k, v)}
                    onRemove={() => removeAdminPM(idx)}
                    profile={profile}
                  />
                ))}
              </div>
            )}

          </div>
        </div>
      );
    };

    // ============================================================
    // ============================================================
    // Step: Interlocuteurs LBC-FT et Qualité (SEC / SPE uniquement)
    // ============================================================
    // PP mock list for interlocuteur dropdowns (in production: derived from actual step data)
    const PREV_PP_LIST = [
      { key: 'pp1', label: 'Mme DUBOIS Maud', prenom: 'Maud', nom: 'DUBOIS' },
      { key: 'pp2', label: 'M. DUPONT Jean',  prenom: 'Jean', nom: 'DUPONT' },
      { key: 'pp3', label: 'Mme DURAND Marie', prenom: 'Marie', nom: 'DURAND' },
      { key: 'pp4', label: 'M. MARTIN Pierre', prenom: 'Pierre', nom: 'MARTIN' },
    ];
    const AUTRE_PP = "Une autre personne que celles proposées";

    // ── 4 fonctions avec criticité ──
    const LBC_FUNCTIONS = [
      { id: 'lbcMembre',      label: 'Membre en charge de la conformité LBC-FT',               required: true,  section: 'LBC-FT'  },
      { id: 'lbcResponsable', label: 'Chargé(e) de la conformité',                              required: false, section: 'LBC-FT'  },
      { id: 'qualMembre',     label: 'Membre en charge du management du système de qualité',    required: true,  section: 'Qualité' },
      { id: 'qualResponsable',label: 'Chargé(e) du management du système de qualité',           required: false, section: 'Qualité' },
    ];

    // ── Badge criticité ──
    const FunctionBadge = ({ required }) => (
      <span style={{
        display: 'inline-flex', alignItems: 'center',
        fontSize: '11px', fontWeight: 600, padding: '2px 8px',
        borderRadius: '20px', letterSpacing: '0.02em',
        background: required ? '#FEF2F2' : '#F0F9FF',
        color:      required ? '#DC2626'  : '#0369A1',
        border:     `1px solid ${required ? '#FECACA' : '#BAE6FD'}`,
        flexShrink: 0,
      }}>
        {required ? 'Obligatoire' : 'Optionnel'}
      </span>
    );

    // ── Carte personne ──
    const PersonneCard = ({ person, index, assignedByOthers, onChange, onRemove, canRemove, showError = false, onToggleFn }) => {
      const set = (k, v) => onChange({ ...person, [k]: v });
      // Le toggle est délégué au parent (StepLBCContent) afin d'appliquer la règle métier
      // « Chaque fonction ne peut être attribuée qu'à une seule personne » : si la fonction
      // est déjà cochée sur une autre personne, elle est transférée automatiquement.
      const toggleFn = (fnId) => {
        if (onToggleFn) { onToggleFn(index, fnId); return; }
        const fns = person.functions || {};
        onChange({ ...person, functions: { ...fns, [fnId]: !fns[fnId] } });
      };

      // Les 4 fonctions sont TOUJOURS affichées pour chaque personne (développeur-friendly).
      // La règle d'unicité est gérée côté parent via onToggleFn (transfert automatique).
      const availableFns = LBC_FUNCTIONS;

      const knownPP = PREV_PP_LIST.find(p => p.label === person.selectedOption);
      const isAutre = person.selectedOption === AUTRE_PP;
      const showFields = knownPP || person.searchMode === 'selected' || person.searchMode === 'manual';

      const ppOptions = [
        ...PREV_PP_LIST.map(p => ({ value: p.label, label: p.label })),
        { value: AUTRE_PP, label: '+ Une autre personne' },
      ];

      const handlePickPP = (v) => {
        const base = {
          ...person,
          selectedOption: v,
          searchMode: undefined, searchLabel: '',
          nom: '', prenom: '', conseilRegional: '', civilite: '',
          prenom2: '', prenom3: '', prenom4: '', nomUsage: '',
        };
        onChange(base);
      };

      return (
        <div style={{
          background: T.color.white,
          border: `1px solid ${T.color.border}`,
          borderRadius: T.radius,
          boxShadow: T.shadow.card,
          padding: '24px',
          position: 'relative',
        }}>
          {/* Header carte */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
            <span style={{ fontSize: '14px', fontWeight: 700, color: T.color.primaryBlue }}>
              Personne {index + 1}
            </span>
            {canRemove && (
              <button onClick={onRemove} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                fontSize: '13px', color: T.color.gray, padding: '4px 8px',
                borderRadius: T.radius, fontFamily: T.font,
              }}>
                Retirer
              </button>
            )}
          </div>

          {/* Sélection de la personne */}
          <div style={{ marginBottom: '20px' }}>
            <FieldSelect
              label="Sélectionnez la personne"
              required
              value={person.selectedOption || ''}
              onChange={handlePickPP}
              options={ppOptions}
              placeholder="Sélectionnez"
            />
            {showError && !person.selectedOption && (
              <p style={{ fontSize: '13px', color: '#DC2626', margin: '4px 0 0 0' }}>
                Ce champ est obligatoire.
              </p>
            )}
          </div>

          {/* PP connue → identité en lecture seule */}
          {knownPP && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px' }}>
              <ReadOnlyField label="Prénom" value={knownPP.prenom} />
              <ReadOnlyField label="Nom" value={knownPP.nom} />
            </div>
          )}

          {/* Autre personne → recherche */}
          {isAutre && (
            <div style={{ marginBottom: '20px' }}>
              <PersonSearchAutocomplete
                searchMode={person.searchMode}
                selectedLabel={person.searchLabel}
                onSelectPerson={(p) => onChange({
                  ...person,
                  searchMode: 'selected',
                  searchLabel: `${p.civilite} ${p.nom} ${p.prenom} - ${p.region}`,
                  civilite: p.civilite, nom: p.nom, prenom: p.prenom,
                  conseilRegional: p.conseilRegional,
                })}
                onManual={() => onChange({
                  ...person,
                  searchMode: 'manual', searchLabel: '+ Renseignez manuellement',
                  nom: '', prenom: '', conseilRegional: '', civilite: '',
                })}
                onClear={() => onChange({
                  ...person,
                  searchMode: undefined, searchLabel: '',
                  nom: '', prenom: '', conseilRegional: '', civilite: '',
                })}
              />

              {person.searchMode === 'selected' && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '20px' }}>
                  <ReadOnlyField label="Prénom" value={person.prenom} />
                  <ReadOnlyField label="Nom" value={person.nom} />
                  <ReadOnlyField label="CRO d'inscription principale" value={person.conseilRegional} />
                </div>
              )}

              {person.searchMode === 'manual' && (
                <div style={{ marginBottom: '20px' }}>
                  {/* Civilité */}
                  <div style={{ marginBottom: '16px' }}>
                    <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 8px 0' }}>
                      <span style={{ color: '#C81E1E' }}>* </span>Civilité
                    </p>
                    <div style={{ display: 'flex', gap: '24px' }}>
                      {CIVILITE_OPTIONS.map(opt => {
                        const sel = person.civilite === opt;
                        return (
                          <label key={opt} onClick={() => set('civilite', opt)} style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
                            <div style={{ width: '20px', height: '20px', borderRadius: '50%', flexShrink: 0, border: `2px solid ${sel ? T.color.primaryBlue : T.color.borderMedium}`, display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.color.white }}>
                              {sel && <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: T.color.primaryBlue }} />}
                            </div>
                            <span style={{ fontSize: '14px', color: T.color.textDark }}>{opt}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                  {/* Nom / Prénom / Prénom 2 */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <FieldInput label="Nom de famille" required value={person.nom || ''} onChange={v => set('nom', v)} />
                    <FieldInput label="Prénom" required value={person.prenom || ''} onChange={v => set('prenom', v)} />
                    <FieldInput label="Prénom 2" value={person.prenom2 || ''} onChange={v => set('prenom2', v)} />
                  </div>
                  {/* Prénom 3 / Prénom 4 / Nationalité */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
                    <FieldInput label="Prénom 3" value={person.prenom3 || ''} onChange={v => set('prenom3', v)} />
                    <FieldInput label="Prénom 4" value={person.prenom4 || ''} onChange={v => set('prenom4', v)} />
                    <FieldSelect label="Nationalité" required value={person.nationalite || ''} onChange={v => set('nationalite', v)} options={PAYS_OPTIONS} placeholder="Sélectionnez" />
                  </div>
                  {/* Adresse */}
                  <AddressBlock
                    data={person}
                    onChange={(k, v) => set(k, v)}
                    onSelectAddress={(fields) => onChange({ ...person, ...fields })}
                  />
                </div>
              )}
            </div>
          )}

          {/* Coordonnées de contact (si personne sélectionnée ou saisie) */}
          {showFields && (
            <div style={{ marginBottom: '20px' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '12px' }}>
                <FieldInput label="Email professionnel" required value={person.emailPro || ''} onChange={v => set('emailPro', v)} placeholder="xxx@exemple.com" />
                <FieldInput label="Téléphone fixe" value={person.telephoneFixe || ''} onChange={v => set('telephoneFixe', v)} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                <FieldInput label="Portable" required value={person.portable || ''} onChange={v => set('portable', v)} />
              </div>
            </div>
          )}

          {/* Fonctions assumées — Checkboxes */}
          {showFields && availableFns.length > 0 && (
            <div style={{ borderTop: `1px solid ${T.color.border}`, paddingTop: '20px' }}>
              <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 14px 0' }}>
                Fonctions assumées par cette personne
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                {availableFns.map(fn => {
                  const checked = !!(person.functions || {})[fn.id];
                  return (
                    <label key={fn.id} onClick={() => toggleFn(fn.id)} style={{
                      display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer',
                      padding: '10px 14px', borderRadius: T.radius,
                      border: `1px solid ${checked ? T.color.primaryBlue : T.color.border}`,
                      background: checked ? '#F0F4FA' : T.color.white,
                      transition: 'all 0.15s',
                    }}>
                      <div style={{
                        width: '18px', height: '18px', borderRadius: '4px', flexShrink: 0,
                        border: `2px solid ${checked ? T.color.primaryBlue : T.color.borderMedium}`,
                        background: checked ? T.color.primaryBlue : T.color.white,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                      }}>
                        {checked && (
                          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                            <path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                      </div>
                      <span style={{ fontSize: '14px', color: T.color.textDark, flex: 1, lineHeight: '20px' }}>
                        {fn.required && <span style={{ color: '#C81E1E', fontWeight: 700 }}>* </span>}
                        {fn.label}
                      </span>
                    </label>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    const StepLBCContent = ({ data, update, showError = false, onDismissError, onTriggerError }) => {
      // persons = array of PersonneCard state objects
      const persons = (data && data.persons) ? data.persons : [
        { id: 1, selectedOption: '', functions: { lbcMembre: true, lbcResponsable: true, qualMembre: true, qualResponsable: true } }
      ];

      const setPersons = (newPersons) => update('persons', newPersons);

      // Which function IDs are assigned by ALL OTHER persons (for a given person index)
      const assignedByOthers = (myIndex) => {
        const result = [];
        persons.forEach((p, i) => {
          if (i === myIndex) return;
          LBC_FUNCTIONS.forEach(fn => {
            if ((p.functions || {})[fn.id]) result.push(fn.id);
          });
        });
        return result;
      };

      // Are the 2 required functions covered?
      const coveredFnIds = new Set();
      persons.forEach(p => {
        LBC_FUNCTIONS.forEach(fn => {
          if ((p.functions || {})[fn.id]) coveredFnIds.add(fn.id);
        });
      });
      const requiredCovered = LBC_FUNCTIONS.filter(f => f.required).every(f => coveredFnIds.has(f.id));

      // Are all 4 functions already assigned?
      const allAssigned = LBC_FUNCTIONS.every(fn => coveredFnIds.has(fn.id));

      // Remaining unassigned functions (to show in summary)
      const unassigned = LBC_FUNCTIONS.filter(fn => !coveredFnIds.has(fn.id));
      // Fonctions obligatoires non couvertes (pour la popup d'erreur)
      const unassignedRequired = unassigned.filter(fn => fn.required);

      const addPerson = () => {
        // US PEP-3590, Scénario 8 : le clic sur « + Ajouter une personne pour les fonctions
        // restantes » ajoute toujours un nouveau bloc « Personne N », avec les 4 fonctions
        // affichées. Pré-cochage uniquement des fonctions encore non attribuées à un autre
        // bloc (règle métier : « Chaque fonction ne peut être attribuée qu'à une seule personne »).
        const newFunctions = {};
        unassigned.forEach(fn => { newFunctions[fn.id] = true; });
        setPersons([...persons, { id: Date.now(), selectedOption: '', functions: newFunctions }]);
      };

      const removePerson = (index) => {
        setPersons(persons.filter((_, i) => i !== index));
      };

      const updatePerson = (index, newPerson) => {
        const updated = persons.map((p, i) => i === index ? newPerson : p);
        setPersons(updated);
      };

      // Toggle d'une fonction en respectant la règle « une fonction = une seule personne ».
      // Si la fonction était déjà cochée sur une autre personne, on la lui retire (transfert).
      const toggleFnForPerson = (personIndex, fnId) => {
        const currentlyChecked = !!(persons[personIndex].functions || {})[fnId];
        const updated = persons.map((p, i) => {
          const fns = { ...(p.functions || {}) };
          if (currentlyChecked) {
            // Décocher sur la personne courante uniquement
            if (i === personIndex) fns[fnId] = false;
          } else {
            // Cocher sur la personne courante et retirer des autres
            if (i === personIndex) fns[fnId] = true;
            else if (fns[fnId]) fns[fnId] = false;
          }
          return { ...p, functions: fns };
        });
        setPersons(updated);
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
          {/* Title */}
          <div>
            <h1 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0', lineHeight: '28.8px' }}>
              Interlocuteurs LBC-FT et Qualité
            </h1>
            <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 8px 0', lineHeight: '21px' }}>
              Désignez un responsable pour chacune des fonctions ci-dessous. Vous pouvez attribuer plusieurs fonctions à la même personne.
            </p>
            <p style={{ fontSize: '13px', color: T.color.gray, margin: 0 }}>
              <span style={{ color: T.color.gray }}>* </span>Champs obligatoires
            </p>
          </div>

          {/* Cartes personnes */}
          {persons.map((person, index) => (
            <PersonneCard
              key={person.id || index}
              person={person}
              index={index}
              assignedByOthers={assignedByOthers(index)}
              onChange={(updated) => updatePerson(index, updated)}
              onRemove={() => removePerson(index)}
              canRemove={persons.length > 1}
              showError={showError}
              onToggleFn={toggleFnForPerson}
            />
          ))}

          {/* Bouton ajouter — toujours visible (standard), même si toutes les fonctions sont attribuées */}
          <button
            onClick={addPerson}
            style={{
              display: 'flex', alignItems: 'center', gap: '8px',
              background: T.color.white, border: `1px dashed ${T.color.borderMedium}`,
              borderRadius: T.radius, padding: '14px 20px', cursor: 'pointer',
              fontSize: '14px', fontWeight: 500, color: T.color.primaryBlue,
              fontFamily: T.font, width: '100%', justifyContent: 'center',
              transition: 'background 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.background = T.color.bg}
            onMouseLeave={e => e.currentTarget.style.background = T.color.white}
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3V13M3 8H13" stroke={T.color.primaryBlue} strokeWidth="1.8" strokeLinecap="round"/>
            </svg>
            Ajouter une personne pour les fonctions restantes
          </button>

          {/* Popup d'erreur : affiché après clic Suivant si des fonctions OBLIGATOIRES ne sont pas désignées */}
          {showError && unassignedRequired.length > 0 && (
            <>
              {/* Overlay semi-transparent */}
              <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0, 0, 0, 0.4)', zIndex: 999,
              }} />
              {/* Modal popup */}
              <div style={{
                position: 'fixed', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)',
                background: T.color.white, borderRadius: '12px',
                boxShadow: '0 20px 60px rgba(0, 0, 0, 0.25)',
                padding: '32px', width: '480px', maxWidth: '90vw',
                zIndex: 1000,
              }}>
                {/* Icône warning */}
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                  <div style={{
                    width: '40px', height: '40px', borderRadius: '50%',
                    background: '#FEF2F2', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    flexShrink: 0,
                  }}>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                      <path d="M10 6V10M10 14H10.01M18 10C18 14.4183 14.4183 18 10 18C5.58172 18 2 14.4183 2 10C2 5.58172 5.58172 2 10 2C14.4183 2 18 5.58172 18 10Z" stroke="#DC2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>

    // Step: Pièces justificatives
    // ============================================================
    const PIECES_DOCS = [
      {
        id: 'acteNaissance',
        titre: "Extrait de l'acte de naissance comportant la filiation",
        description: "Document officiel attestant de la filiation, délivré par l'autorité compétente. (Pour les ressortissants étrangers)",

      },
      {
        id: 'attestationFiscale',
        titre: "Attestation des services fiscaux justifiant le paiement des impôts",
        description: "pour les personnes dont la résidence fiscale est à l'étranger (au titre de la dernière année fiscale)",
        modele: false,
      },
      {
        id: 'casierJudiciaire',
        titre: "Extrait du casier judiciaire du pays de sa nationalité",
        description: "Extrait de casier judiciaire datant de moins de 3 mois. (Pour les ressortissants étrangers)",
        modele: true,
      },
    ];

    const StepPiecesContent = ({ data, update }) => {
      const d = data || {};
      const files = d.files || {};

      const UploadZone = ({ docId }) => {
        const [dragging, setDragging] = React.useState(false);
        const uploaded = files[docId];

        const handleDrop = (e) => {
          e.preventDefault();
          setDragging(false);
          const file = e.dataTransfer.files[0];
          if (file) update('files', prev => ({ ...(prev || {}), [docId]: file.name }));
        };

        const handleChange = (e) => {
          const file = e.target.files[0];
          if (file) update('files', prev => ({ ...(prev || {}), [docId]: file.name }));
        };

        const handleRemove = () => {
          update('files', prev => {
            const next = { ...(prev || {}) };
            delete next[docId];
            return next;
          });
        };

        if (uploaded) {
          return (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '14px 16px', background: '#F0FDF4', border: '1px solid #BBF7D0',
              borderRadius: T.radius,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#047857" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                <span style={{ fontSize: '14px', color: '#047857', fontWeight: 500 }}>{uploaded}</span>
              </div>
              <button onClick={handleRemove} style={{
                background: 'none', border: 'none', cursor: 'pointer', padding: '4px',
                color: T.color.gray, fontSize: '18px', lineHeight: 1, fontFamily: T.font,
              }}>×</button>
            </div>
          );
        }

        return (
          <label
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={handleDrop}
            style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: '8px', padding: '28px 20px', cursor: 'pointer',
              border: `1px ${dragging ? 'solid' : 'dashed'} ${dragging ? T.color.primaryBlue : T.color.borderMedium}`,
              borderRadius: T.radius,
              background: dragging ? T.color.infoBg : T.color.bg,
              transition: 'all 0.15s',
            }}
          >
            <input type="file" accept=".jpg,.jpeg,.png,.pdf" onChange={handleChange} style={{ display: 'none' }} />
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={T.color.primaryBlue} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span style={{ fontSize: '14px', color: T.color.textDark }}>
              <span style={{ color: T.color.primaryBlue, fontWeight: 500, cursor: 'pointer', textDecoration: 'underline' }}>Parcourir</span>
              {' '}ou Glisser-déposer
            </span>
            <span style={{ fontSize: '13px', color: T.color.gray }}>
              Formats acceptés jpg, jpeg, png, pdf (Taille max 2 Mo)
            </span>
          </label>
        );
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>

          {/* Title */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: '0 0 6px 0', lineHeight: '1.3' }}>
                Liste des pièces justificatives à fournir
              </h2>
              <p style={{ fontSize: '14px', color: T.color.gray, margin: 0 }}>
                Documents requis pour votre dossier d'inscription
              </p>
            </div>
            <span style={{ fontSize: '13px', color: T.color.gray, whiteSpace: 'nowrap', marginTop: '4px' }}>
              *Champs obligatoires
            </span>
          </div>

          {/* Bandeau info */}
          <div style={{
            background: T.color.infoBg, border: `1px solid ${T.color.infoBorder}`,
            borderRadius: T.radius, padding: '16px 20px',
          }}>
            <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 10px 0' }}>
              Préparez vos documents avant de commencer
            </p>
            <ul style={{ margin: 0, paddingLeft: '20px', display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {[
                'Formats acceptés : PDF, JPG, JPEG, PNG',
                'Taille maximale par fichier : 2 Mo',
                'Assurez-vous que vos documents sont lisibles et complets',
                "Les champs marqués d'un astérisque (*) sont obligatoires",

                <li key={i} style={{ fontSize: '14px', color: T.color.textDark, lineHeight: '22px' }}>{item}</li>

          {/* Cartes documents */}
          {PIECES_DOCS.map(doc => (
            <div key={doc.id} style={{
              background: T.color.white, border: `1px solid ${T.color.border}`,
              borderRadius: T.radius, boxShadow: T.shadow.card, padding: '24px',
            }}>
              <p style={{ fontSize: '15px', fontWeight: 600, color: T.color.textDark, margin: '0 0 6px 0', lineHeight: '22px' }}>
                {doc.titre}
              </p>
              <p style={{ fontSize: '14px', color: T.color.gray, margin: '0 0 12px 0', lineHeight: '21px' }}>
                {doc.description}

                  display: 'inline-block', fontSize: '14px', color: T.color.primaryBlue,
                  fontWeight: 500, textDecoration: 'underline', marginBottom: '16px',
