                  Télécharger le modèle
                </a>
              )}
              <UploadZone docId={doc.id} />
            </div>
          ))}

        </div>
      );
    };

    // Step: Consentement et RGPD
    // ============================================================
    const StepConsentementContent = ({ data, update }) => {
      const d = data || {};
      const u = (k, v) => update(k, v);
      const engagementChecked = !!d.engagement;
      const rgpdChecked       = !!d.rgpd;

      const InfoBlock = ({ icon, title, color, bg, border, children }) => (
        <div style={{
          display: 'flex', gap: '16px', padding: '20px 24px',
          background: bg, border: `1px solid ${border}`,
          borderRadius: T.radius, lineHeight: '22px',
        }}>
          <div style={{
            flexShrink: 0, width: '40px', height: '40px', borderRadius: '10px',
            background: color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            {icon}
          </div>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: '14px', fontWeight: 700, color: T.color.textDark, margin: '0 0 6px 0' }}>{title}</p>
            <div style={{ fontSize: '14px', color: T.color.textDark, lineHeight: '22px' }}>{children}</div>
          </div>
        </div>
      );

      const CheckRow = ({ checked, onChange, required, children, hasError }) => (
        <label style={{
          display: 'flex', gap: '14px', alignItems: 'flex-start', cursor: 'pointer',
          padding: '18px 20px', background: T.color.white,
          border: `1px solid ${hasError ? '#FF2B44' : checked ? '#1B324F' : T.color.border}`,
          borderRadius: T.radius, transition: 'border-color 0.15s',
        }}>
          <div
            onClick={onChange}
            style={{
              flexShrink: 0, marginTop: '2px',
              width: '20px', height: '20px', borderRadius: '4px',
              border: `2px solid ${checked ? T.color.primaryBlue : hasError ? T.color.primaryRed : T.color.borderMedium}`,
              background: checked ? T.color.primaryBlue : T.color.white,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'all 0.15s', cursor: 'pointer',
            }}
          >
            {checked && (
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6L5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </div>
          <span style={{ fontSize: '14px', color: T.color.textDark, lineHeight: '22px', userSelect: 'none' }}>
            {required && <span style={{ color: T.color.primaryRed, marginRight: '3px' }}>*</span>}
            {children}
          </span>
        </label>
      );

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>

          {/* Title */}
          <div>
            <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, margin: '0 0 8px 0', lineHeight: '36px' }}>
              Consentement et RGPD
            </h2>
            <p style={{ fontSize: '14px', color: T.color.gray, margin: 0 }}>
              Avant de soumettre votre dossier, veuillez prendre connaissance des informations suivantes et confirmer votre engagement.
            </p>
          </div>

          {/* Info blocks */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>

            {/* Bloc 1 — Utilisation des données */}
            <InfoBlock
              title="Utilisation de vos données"
              color="#1B324F"
              bg={T.color.infoBg}
              border={T.color.infoBorder}
              icon={
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1B324F" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              }
            >
              L'ensemble des informations recueillies dans ce formulaire sont nécessaires pour votre inscription à l'Ordre et votre participation aux évènements de l'Ordre (Assemblées générales, Congrès, etc.). Elles font l'objet d'un traitement automatisé et sont destinées aux Conseils régionaux et au Conseil national de l'Ordre des experts-comptables.
            </InfoBlock>

            {/* Bloc 2 — Conservation */}
            <InfoBlock
              title="Durée de conservation"
              color="#0369A1"
              bg="#F0F9FF"
              border="#BAE6FD"
              icon={
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0369A1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
              }
            >
              <ul style={{ margin: '0', paddingLeft: '18px', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                <li>Vos données seront conservées <strong>jusqu'à 5 ans après votre radiation</strong>.</li>
                <li>La dernière attestation d'assurance sera archivée <strong>sans limitation de durée</strong> en cas de mise en cause de responsabilité.</li>
                <li>Vos données anonymisées seront archivées sans limitation de durée aux fins de statistiques professionnelles dans le respect de l'article 29 7° du décret du 30 mars 2012.</li>
              </ul>
            </InfoBlock>

            {/* Bloc 3 — Vos droits */}
            <InfoBlock
              title="Vos droits sur vos données personnelles"
              color="#7C3AED"
              bg="#F5F3FF"
              border="#DDD6FE"
              icon={
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
                </svg>
              }
            >
              Nous vous rappelons que vous disposez d'un droit à la portabilité de vos données, de droits d'accès, de rectification, de limitation et d'opposition pour motifs légitimes, ainsi que du droit de définir des directives relatives au sort de vos données personnelles après votre mort sous réserves des dispositions légales et réglementaires applicables. Vous avez la possibilité d'introduire une réclamation auprès de la Commission nationale de l'informatique et des libertés, autorité de contrôle en charge du respect des obligations en matière des données à caractère personnel : 3 Place de Fontenoy – TSA 80715 – 75334 Paris 07.
            </InfoBlock>

            {/* Bloc 4 — Exercer ses droits */}
            <InfoBlock
              title="Comment exercer vos droits ?"
              color="#047857"
              bg="#F0FDF4"
              border="#BBF7D0"
              icon={
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#047857" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/>
                </svg>
              }
            >
              Pour exercer vos droits, vous pouvez formuler votre demande directement depuis <strong>PEP Assist</strong>.
            </InfoBlock>
          </div>

          {/* Separator */}
          <div style={{ height: '1px', background: T.color.border }} />

          {/* Checkboxes */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            <p style={{ fontSize: '13px', color: T.color.gray, margin: 0 }}>
              <span style={{ color: T.color.primaryRed }}>*</span> Champs obligatoires
            </p>

            <CheckRow
              checked={engagementChecked}
              onChange={() => u('engagement', !engagementChecked)}
              required
            >
              Je m'engage à communiquer au Conseil régional de l'Ordre, dans un délai maximum de deux mois, tout changement intervenu dans mon adresse ou ma situation professionnelle, et à joindre les justificatifs correspondants.
            </CheckRow>

            <CheckRow
              checked={rgpdChecked}
              onChange={() => u('rgpd', !rgpdChecked)}
              required
            >
              J'ai pris connaissance des informations ci-dessus relatives au traitement de mes données personnelles et j'accepte les conditions d'utilisation.
            </CheckRow>
          </div>

        </div>
      );
    };

    // ============================================================
    // Drawer: Ajouter un associé
    // ============================================================
    const DrawerAjoutAssocie = ({ isOpen, onClose, onAdd }) => {
      const [type, setType]     = useState('');
      const [ppData, setPpData] = useState({});
      const [pmData, setPmData] = useState({});
      const [success, setSuccess] = useState(false);

      const reset = () => { setType(''); setPpData({}); setPmData({}); setSuccess(false); };
      const handleClose = () => { reset(); onClose(); };

      const updatePP = (k, v) => setPpData(prev => ({ ...prev, [k]: v }));
      const updatePM = (k, v) => setPmData(prev => ({ ...prev, [k]: v }));

      const getLabel = () => {
        if (type === 'pp') return `${ppData.civilite || ''} ${ppData.nom || ''} ${ppData.prenom || ''}`.trim();
        if (type === 'pm') return pmData.denomination || '';
        return '';
      };

      // Peut valider dès qu'une recherche a abouti (selected ou manual)
      const canAdd = type !== '' && (
        type === 'pp' ? ppData.searchMode !== undefined : pmData.pmSearchMode !== undefined
      );

      const handleAdd = () => {
        if (!canAdd) return;
        onAdd({ type, label: getLabel() });
        setSuccess(true);
      };

      if (!isOpen) return null;

      return (
        <>
          {/* Backdrop */}
          <div onClick={handleClose} style={{
            position: 'fixed', inset: 0, background: 'rgba(17,24,39,0.35)', zIndex: 1000,
          }} />

          {/* Panel latéral droit */}
          <div style={{
            position: 'fixed', top: 0, right: 0, bottom: 0, width: '50%',
            background: T.color.white, zIndex: 1001, display: 'flex', flexDirection: 'column',
            boxShadow: '-6px 0 32px rgba(0,0,0,0.14)', fontFamily: T.font,
          }}>

            {/* En-tête */}
            <div style={{
              padding: '20px 24px', borderBottom: `1px solid ${T.color.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0,
            }}>
              <div>
                <h3 style={{ margin: 0, fontSize: '18px', fontWeight: 700, color: T.color.textDark }}>
                  Ajouter un associé
                </h3>
                <p style={{ margin: '2px 0 0', fontSize: '13px', color: T.color.gray }}>
                  Renseignez les informations de l'associé à déclarer
                </p>
              </div>
              <button onClick={handleClose} style={{
                background: 'none', border: `1px solid ${T.color.border}`, borderRadius: T.radius,
                cursor: 'pointer', padding: '6px 10px', fontSize: '16px', color: T.color.gray, lineHeight: 1,
              }}>✕</button>
            </div>

            {/* Corps — scrollable */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '24px' }}>

              {success ? (
                /* ── État succès ── */
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: '48px', gap: '16px' }}>
                  <div style={{ width: '60px', height: '60px', borderRadius: '50%',
                    background: '#F0FDF4', border: '1px solid #BBF7D0',
                    display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16A34A" strokeWidth="2.5">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </div>
                  <p style={{ fontSize: '16px', fontWeight: 700, color: T.color.textDark, margin: 0, textAlign: 'center' }}>
                    Associé ajouté avec succès
                  </p>
                  <p style={{ fontSize: '14px', color: T.color.gray, margin: 0, textAlign: 'center', maxWidth: '300px', lineHeight: 1.5 }}>
                    {getLabel()}
                  </p>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', width: '100%', marginTop: '24px' }}>
                    <button onClick={reset} style={{
                      width: '100%', padding: '11px', border: `1px solid ${T.color.primaryBlue}`,
                      borderRadius: T.radius, background: 'none', color: T.color.primaryBlue,
                      fontSize: '14px', fontWeight: 600, cursor: 'pointer',
                    }}>+ Ajouter un autre associé</button>
                    <button onClick={handleClose} style={{
                      width: '100%', padding: '11px', border: 'none',
                      borderRadius: T.radius, background: T.color.primaryBlue, color: T.color.white,
                      fontSize: '14px', fontWeight: 600, cursor: 'pointer',
                    }}>Fermer</button>
                  </div>
                </div>
              ) : (
                <>
                  {/* ─── Type de personne ─── */}
                  <div style={{ marginBottom: '24px' }}>
                    <p style={{ fontSize: '14px', fontWeight: 600, color: T.color.textDark, margin: '0 0 12px 0' }}>
                      <span style={{ color: T.color.primaryRed }}>* </span>Type de personne à ajouter
                    </p>
                    {[{ val: 'pp', label: 'Personne physique' }, { val: 'pm', label: 'Personne morale' }].map(({ val, label }) => {
                      const sel = type === val;
                      return (
                        <label key={val} onClick={() => { setType(val); setPpData({}); setPmData({}); }}
                          style={{ display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer', marginBottom: '10px' }}>
                          <div style={{ width: '20px', height: '20px', borderRadius: '50%', flexShrink: 0,
                            border: `2px solid ${sel ? T.color.primaryBlue : T.color.borderMedium}`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center', background: T.color.white }}>
                            {sel && <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: T.color.primaryBlue }} />}
                          </div>
                          <span style={{ fontSize: '14px', color: T.color.textDark }}>{label}</span>
                        </label>
                      );
                    })}
                  </div>

                  {/* ─── Personne Physique : comportement iso RL PP ─── */}
                  {type === 'pp' && (
                    <div style={{ paddingTop: '20px', borderTop: `1px solid ${T.color.border}` }}>
                      <PersonnePhysiqueCard data={ppData} update={updatePP} profile="SEC" />
                    </div>
                  )}

                  {/* ─── Personne Morale : comportement iso RL PM ─── */}
                  {type === 'pm' && (
                    <div style={{ paddingTop: '20px', borderTop: `1px solid ${T.color.border}` }}>
                      <PersonneMoraleCard data={pmData} update={updatePM} profile="SEC" hideAssocieeQuestion={true} />
                    </div>
                  )}
                </>
              )}
            </div>

            {/* Pied de page fixe */}
            {!success && (
              <div style={{
                padding: '16px 24px', borderTop: `1px solid ${T.color.border}`,
                display: 'flex', gap: '12px', flexShrink: 0, background: T.color.white,
              }}>
                <button onClick={handleClose} style={{
                  flex: 1, padding: '10px 0', border: `1px solid ${T.color.border}`,
                  borderRadius: T.radius, background: 'none', color: T.color.textDark,
                  fontSize: '14px', fontWeight: 500, cursor: 'pointer', fontFamily: T.font,
                }}>
                  Annuler
                </button>
                <button onClick={handleAdd} disabled={!canAdd} style={{
                  flex: 2, padding: '10px 0', border: 'none', borderRadius: T.radius,
                  background: canAdd ? T.color.primaryBlue : '#D1D5DB',
                  color: T.color.white,
                  fontSize: '14px', fontWeight: 600,
                  cursor: canAdd ? 'pointer' : 'default', fontFamily: T.font,
                  transition: 'background 0.15s',
                }}>
                  Ajouter l'associé →
                </button>
              </div>
            )}
          </div>
        </>
      );
    };

    // Step: Liste des associés
    // ============================================================
    const ASSOCIES_DATA = [
      { nom: 'A',   fonction: 'Représentant légal',            capNombre: '3 000', capPct: '30,00%', voteNombre: '6 000', votePct: '36,36%', type: 'ec' },

      const parseNum = (str) => parseInt((str || '').replace(/[\s\u00a0]/g, '')) || 0;

          if (d1 !== 0) return d1;
          const d2 = parseNum(b.capNpNb) - parseNum(a.capNpNb);   // N°2 : nue-propriété

          <td style={{ ...cellR, borderRight: bdrV }}>{r.capUsPct}</td>

          <button onClick={() => setDrawerOpen(true)} style={{

    };

    // ============================================================
    // REUSABLE: Text Input
    // ============================================================
    const FieldInput = ({ label, required, value, onChange, type = 'text', placeholder }) => {
      const [focused, setFocused] = useState(false);

        <div>
          {label && (
            <label style={{
              display: 'block', fontSize: '14px', fontWeight: 500,

    const FieldSelect = ({ label, required, value, onChange, options, placeholder, height = '36px' }) => {

        <div>
          {label && (
            <label style={{
              display: 'block', fontSize: '14px', fontWeight: 500,

              onChange={(e) => onChange(e.target.value)}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              style={{
                width: '100%',
                height: height,
                border: `1px solid ${focused ? T.color.primaryBlue : T.color.border}`,
                borderRadius: T.radius,
                padding: '0 36px 0 14px',
                fontSize: '14px',
                color: value ? T.color.textDark : T.color.gray,
                background: T.color.white,
                appearance: 'none',
                outline: 'none',
                transition: 'border-color 0.15s',
              }}
            >
              {placeholder && <option value="">{placeholder}</option>}
              {options.map((opt, i) => {
                const v = typeof opt === 'object' ? opt.value : opt;
                const l = typeof opt === 'object' ? opt.label : opt;
                const dis = typeof opt === 'object' ? (opt.disabled || false) : false;
                return <option key={i} value={v} disabled={dis} style={dis ? { color: '#9CA3AF', fontStyle: 'italic' } : {}}>{l}</option>;
              })}
            </select>
            <div style={{
              position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)',
              pointerEvents: 'none',
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.color.gray} strokeWidth="2.5">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // APP
    // ============================================================
    const App = () => {
      const [currentStep, setCurrentStep] = useState(1);
      const [step1, setStep1] = useState({});
      const [step3, setStep3] = useState({});
      const [step4, setStep4] = useState({});
      const [step5, setStep5] = useState({});
      const [stepPCP, setStepPCP] = useState({});
      const [stepLBC, setStepLBC] = useState({});
      const [stepConsent, setStepConsent] = useState({});
      const [stepPieces, setStepPieces] = useState({});
      const [stepAdmin, setStepAdmin] = useState({});
      const [step4Attempted, setStep4Attempted] = useState(false);
      const [lbcAttempted, setLbcAttempted] = useState(false);

      const updateStep1 = useCallback((path, value) => {
        setStep1(prev => {
          const next = { ...prev };
          const parts = path.split('.');
          if (parts.length === 1) {
            next[parts[0]] = value;
          } else if (parts.length === 2) {
            next[parts[0]] = { ...(next[parts[0]] || {}), [parts[1]]: value };
          }
          return next;
        });
      }, []);

      // Dynamic steps based on state
      const hasPM = !!(step4 && step4.declarePersonneMorale);
      const steps = buildSteps(hasPM, step1.profile, step3.formeJuridique);

      const updateStepAdmin = useCallback((key, value) => {
        setStepAdmin(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      // Validation: Step 1 requires profile + qualite + croec
      const isStep1Valid = () => {
        if (!step1.profile || !step1.qualite || !step1.croec) return false;
        if (step1.qualite === 'mandataire') {
          const m = step1.mandataire || {};
          if (!m.civilite || !m.nom || !m.prenom || !m.fonction || !m.telephone || !m.email || !m.rue || !m.codePostal || !m.ville || !m.pays) {
            return false;
          }
        }
        return true;
      };

      const goNext = () => {
        const stepName = steps[currentStep - 1];
        if (stepName === "Représentants Légaux" && !step4.declarePersonnePhysique && !step4.declarePersonneMorale) {
          setStep4Attempted(true);
          return;
        }
        if (stepName === LBC_STEP) {
          const persons = (stepLBC && stepLBC.persons) ? stepLBC.persons : [];
          const covered = new Set();
          persons.forEach(p => { LBC_FUNCTIONS.forEach(fn => { if ((p.functions || {})[fn.id]) covered.add(fn.id); }); });
          const valid = LBC_FUNCTIONS.filter(f => f.required).every(f => covered.has(f.id));
          if (!valid) { setLbcAttempted(true); return; }
        }
        setStep4Attempted(false);
        setLbcAttempted(false);
        window.scrollTo(0, 0);
        setCurrentStep(prev => Math.min(prev + 1, steps.length));
      };
      const goPrev = () => {
        setStep4Attempted(false);
        setLbcAttempted(false);
        window.scrollTo(0, 0);
        setCurrentStep(prev => Math.max(prev - 1, 1));
      };

      const updateStep3 = useCallback((key, value) => {
        setStep3(prev => ({ ...prev, [key]: value }));
      }, []);

      const updateStep4 = useCallback((key, value) => {
        setStep4(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const updateStep5 = useCallback((key, value) => {
        setStep5(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const updateStepPCP = useCallback((key, value) => {
        setStepPCP(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const updateStepPieces = useCallback((key, value) => {
        setStepPieces(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);
      const updateStepConsent = useCallback((key, value) => {
        setStepConsent(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);
      const updateStepLBC = useCallback((key, value) => {
        setStepLBC(prev => ({ ...prev, [key]: typeof value === 'function' ? value(prev[key]) : value }));
      }, []);

      const renderStep = () => {
        const stepName = steps[currentStep - 1];
        switch (stepName) {
          case "Qualité de la PM & CROEC": return <Step1Content data={step1} update={updateStep1} />;
          case "Dates de sessions": return <Step2Content croec={step1.croec} />;
          case "Caractéristiques de la société et renseignements divers": return <Step3Content data={step3} update={updateStep3} profile={step1.profile} />;
          case "Représentants Légaux": return <Step4Content data={step4} update={updateStep4} profile={step1.profile} showError={step4Attempted} />;
          case EXTRA_STEP: return <Step5Content data={step5} update={updateStep5} profile={step1.profile} />;
          case ADMIN_STEP: return <StepAdminContent data={stepAdmin} update={updateStepAdmin} formeJuridique={step3.formeJuridique} profile={step1.profile} />;
          case "Personne de contact principal": return <StepPCPContent data={stepPCP} update={updateStepPCP} />;
          case LBC_STEP: return <StepLBCContent data={stepLBC} update={updateStepLBC} showError={lbcAttempted} onDismissError={() => setLbcAttempted(false)} onTriggerError={() => setLbcAttempted(true)} />;
          case "Liste des associés": return <StepAssociesContent pcpSelection={stepPCP?.pcp} lbcPersons={stepLBC?.persons} />;
          case "Pièces justificatives": return <StepPiecesContent data={stepPieces} update={updateStepPieces} />;
          case "Consentement et RGPD": return <StepConsentementContent data={stepConsent} update={updateStepConsent} />;
          default: return (
            <div style={{ padding: '40px', textAlign: 'center', color: T.color.gray }}>
              <h2 style={{ fontSize: '24px', fontWeight: 700, color: T.color.textDark, marginBottom: '16px' }}>
                {stepName}
              </h2>
              <p>Étape à venir — construction étape par étape.</p>
            </div>
          );
        }
      };

      const canNext = true;

      return (
        <div style={{ minHeight: '100vh', background: T.color.bg }}>
          <Navbar />

          {/* Main layout */}
          <div style={{
            display: 'flex',
            paddingTop: '80px',
            paddingBottom: '72px',
            minHeight: '100vh',
          }}>
            {/* Sidebar */}
            <Stepper currentStep={currentStep} steps={steps} />

            {/* Content area */}
            <div style={{
              flex: 1,
              padding: '40px 48px',
              maxWidth: '912px',
            }}>
              {renderStep()}
            </div>
          </div>

          {/* Bottom bar */}
          <BottomBar
            canNext={canNext}
            onNext={goNext}
            onPrev={goPrev}
            onSave={() => alert('Formulaire enregistré pour plus tard.')}
            showPrev={currentStep > 1}
            showSave={currentStep !== 2}
          />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
